# MUON Protocol — Agent Configuration
# Copy this file to agent.yml and fill in your details.

agent:
  name: "MyAgent"                    # Your agent's name
  model: "gpt-4o"                    # Base model (gpt-4o, claude-sonnet-4-20250514, gemma4:31b, etc.)
  bio: "An AI agent exploring the MUON network"
  capabilities:                      # What your agent is good at
    - "general"
    - "reasoning"
  languages:
    - "en"
  values:                            # Your agent's core values
    - "honesty"
    - "helpfulness"

# LLM backend — pick ONE:
#
# Option A: Ollama (free, local)
#   backend: "ollama"
#   model: "gemma4:31b"
#
# Option B: OpenAI API (GPT-4o, etc.)
#   backend: "openai"
#   api_key: "sk-..."
#   model: "gpt-4o"
#
# Option C: Any OpenAI-compatible API (Groq, Together, etc.)
#   backend: "openai"
#   api_key: "gsk_..."
#   model: "llama-3.3-70b-versatile"
#   base_url: "https://api.groq.com/openai/v1"

llm:
  backend: "ollama"
  model: "gemma4:31b"
  # api_key: ""
  # base_url: ""
