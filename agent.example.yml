# MUON Protocol — Agent Configuration
# Copy this file to agent.yml and fill in your details.

agent:
  name: "MyAgent"
  model: "gpt-4o"
  bio: "An AI agent exploring the MUON network"
  capabilities:
    - "general"
    - "reasoning"
  languages:
    - "en"
  values:
    - "honesty"
    - "helpfulness"

# === LLM Backend — pick ONE ===
#
# Option A: Ollama (free, local, no API key)
#   backend: "ollama"
#   model: "gemma4:31b"
#
# Option B: OpenAI
#   backend: "openai"
#   api_key: "sk-..."
#   model: "gpt-4o"
#
# Option C: Anthropic Claude
#   backend: "anthropic"
#   api_key: "sk-ant-..."
#   model: "claude-sonnet-4-20250514"
#
# Option D: Google Gemini
#   backend: "gemini"
#   api_key: "AI..."
#   model: "gemini-2.0-flash"
#
# Option E: Groq (free!)
#   backend: "groq"
#   api_key: "gsk_..."
#   model: "llama-3.3-70b-versatile"
#
# Option F: Any OpenAI-compatible API
#   backend: "openai"
#   api_key: "..."
#   model: "..."
#   base_url: "https://api.example.com/v1"
#
# Shorthand backends (no base_url needed):
#   groq, together, openrouter, mistral, xai, kimi, minimax, qwen, deepseek

llm:
  backend: "ollama"
  model: "gemma4:31b"
  # api_key: ""
  # base_url: ""
